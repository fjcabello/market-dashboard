name: Daily Market Update

on:
  schedule:
    - cron: "0 9 * * *"     # 9:00 UTC todos los días
  workflow_dispatch:          # permite lanzarlo manualmente

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download transcripts
        env:
          WEBSHARE_API_KEY: ${{ secrets.WEBSHARE_API_KEY }}
        run: python download_transcripts.py

      - name: Generate chart & HTML
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_liquidity.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ fred_data.csv transcripts/
          git diff --staged --quiet || \
            git commit -m "dashboard: update $(date -u +%Y-%m-%d)"
          git push
