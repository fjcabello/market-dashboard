name: Daily Transcripts Download

on:
  schedule:
    - cron: "0 9 * * *"     # 9:00 UTC todos los días
  workflow_dispatch:          # permite lanzarlo manualmente

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download transcripts
        run: python download_transcripts.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/
          git diff --staged --quiet || \
            git commit -m "transcripts: update $(date -u +%Y-%m-%d)"
          git push
