name: Daily Transcripts Download

on:
  # Programación desactivada: youtube_transcript_api bloquea las IPs de los
  # runners de GitHub Actions (IP de proveedor cloud). Lanzar manualmente
  # o desde una fuente con IP residencial hasta que se resuelva (proxy o
  # cron local).
  workflow_dispatch:          # permite lanzarlo manualmente
    inputs:
      videos_to_check:
        description: "Vídeos recientes a revisar por canal (backfill puntual)"
        required: false
        default: "3"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download transcripts
        env:
          VIDEOS_TO_CHECK: ${{ github.event.inputs.videos_to_check || '3' }}
        run: python download_transcripts.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/
          git diff --staged --quiet || \
            git commit -m "transcripts: update $(date -u +%Y-%m-%d)"
          git push
